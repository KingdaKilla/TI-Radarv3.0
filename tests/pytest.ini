[pytest]
# Pytest-Konfiguration fuer TI-Radar v2 Integrations- und Contract-Tests
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    integration: Integrations-Tests mit Testcontainer (benoetigen Docker)
    contract: Contract-Tests (Pact Consumer/Provider)
    asyncio: Asynchrone Tests mit pytest-asyncio
log_cli = true
log_cli_level = INFO
