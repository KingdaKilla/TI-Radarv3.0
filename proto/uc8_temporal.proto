// =============================================================================
// uc8_temporal.proto — UC8: Temporal Dynamics Analysis
// =============================================================================
// Tracks how the actor landscape evolves over time: new entrants vs persistent
// players, programme evolution, and technology breadth (diversification of
// CPC codes over time). The frontend renders stacked area charts, actor
// timelines, and Sankey diagrams of programme transitions.
// =============================================================================

syntax = "proto3";

package tip.uc8;

option java_multiple_files = true;
option java_package = "de.tip.proto.uc8";
option go_package = "tip/proto/uc8";

import "common.proto";

// ---------------------------------------------------------------------------
// UC8 Temporal Dynamics Service
// ---------------------------------------------------------------------------
service TemporalService {
  // Analyse temporal dynamics: actor persistence, programme evolution,
  // technology breadth.
  rpc AnalyzeTemporal(tip.common.AnalysisRequest) returns (TemporalResponse);
}

// ---------------------------------------------------------------------------
// Actor persistence classification.
// ---------------------------------------------------------------------------
enum ActorPersistenceType {
  ACTOR_PERSISTENCE_TYPE_UNSPECIFIED = 0;

  // Active only in a single year window.
  ONE_TIMER = 1;

  // Active in 2–4 year windows.
  OCCASIONAL = 2;

  // Active in 5+ year windows — sustained commitment.
  PERSISTENT = 3;

  // First appeared in the most recent analysis window.
  NEW_ENTRANT = 4;

  // Was previously active but no activity in the most recent window.
  EXITED = 5;
}

// ---------------------------------------------------------------------------
// Response Messages
// ---------------------------------------------------------------------------

// Year-by-year snapshot of entrant vs persistent actor counts.
message EntrantPersistenceTrend {
  int32 year = 1;

  // Number of actors active for the first time in this year.
  int64 new_entrants = 2;

  // Number of actors that were also active in at least one prior year.
  int64 persistent_actors = 3;

  // Number of actors from the prior year that are no longer active.
  int64 exited_actors = 4;

  // Total distinct actors active in this year.
  int64 total_active = 5;

  // Churn rate: exited / total_active(previous year).
  double churn_rate = 6;

  // Persistence ratio: persistent / total_active.
  double persistence_ratio = 7;
}

// Timeline entry for a specific actor showing their activity windows.
message ActorTimeline {
  // Actor name.
  string actor_name = 1;

  // ISO country code.
  string country_code = 2;

  // Persistence classification.
  ActorPersistenceType persistence_type = 3;

  // First year the actor appears in the data.
  int32 first_active_year = 4;

  // Most recent year the actor appears in the data.
  int32 last_active_year = 5;

  // Total number of years with activity.
  int32 active_years_count = 6;

  // Year-by-year activity counts.
  repeated ActorYearActivity yearly_activity = 7;
}

// Activity of a single actor in a single year.
message ActorYearActivity {
  int32 year = 1;
  int64 patent_count = 2;
  int64 project_count = 3;
  int64 publication_count = 4;
}

// Evolution of funding programmes over time.
message ProgrammeEvolution {
  int32 year = 1;

  // Programme name (e.g. "FP7", "Horizon 2020", "Horizon Europe").
  string programme = 2;

  // Number of projects starting under this programme in this year.
  int64 project_count = 3;

  // Funding volume in EUR for this programme in this year.
  double funding_eur = 4;
}

// Transition between programmes across time periods.
message ProgrammeTransition {
  // Source programme (earlier period).
  string from_programme = 1;

  // Target programme (later period).
  string to_programme = 2;

  // Number of actors that participated in both programmes.
  int64 actor_count = 3;

  // Funding carried across in EUR.
  double funding_eur = 4;
}

// Technology breadth — diversification of CPC codes over time.
message TechnologyBreadthEntry {
  int32 year = 1;

  // Number of distinct CPC codes (4-digit) active in this year.
  int32 unique_cpc_codes = 2;

  // Shannon diversity index of CPC code distribution.
  double shannon_index = 3;

  // Herfindahl index of CPC code concentration.
  double herfindahl_index = 4;

  // Number of new CPC codes appearing for the first time in this year.
  int32 new_codes = 5;
}

// Summary of actor dynamics.
message ActorDynamicsSummary {
  // Total distinct actors across the entire time range.
  int64 total_actors = 1;

  // Number of persistent actors (active >= 5 years).
  int64 persistent_count = 2;

  // Number of one-time actors.
  int64 one_timer_count = 3;

  // Average actor lifespan in years.
  double avg_lifespan_years = 4;

  // Median actor lifespan in years.
  double median_lifespan_years = 5;

  // Overall churn rate.
  double overall_churn_rate = 6;
}

// Full response for Temporal Dynamics analysis.
message TemporalResponse {
  // Year-by-year entrant vs persistent actor trend.
  repeated EntrantPersistenceTrend entrant_persistence_trend = 1;

  // Timeline details for top actors.
  repeated ActorTimeline actor_timeline = 2;

  // Programme evolution over time.
  repeated ProgrammeEvolution programme_evolution = 3;

  // Programme transition flows (for Sankey diagrams).
  repeated ProgrammeTransition programme_transitions = 4;

  // Technology breadth / diversification over time.
  repeated TechnologyBreadthEntry technology_breadth = 5;

  // Summary of actor dynamics.
  ActorDynamicsSummary dynamics_summary = 6;

  // Standard response metadata.
  tip.common.ResponseMetadata metadata = 7;
}
