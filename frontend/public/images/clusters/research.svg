<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#48cae4"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#48cae4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#48cae4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atomGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#90e0ef" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#90e0ef" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Molecular bonds (connecting lines between atoms) -->
  <line x1="300" y1="250" x2="450" y2="300" stroke="#48cae4" stroke-width="2" opacity="0.3"/>
  <line x1="450" y1="300" x2="550" y2="200" stroke="#48cae4" stroke-width="2" opacity="0.28"/>
  <line x1="450" y1="300" x2="500" y2="430" stroke="#48cae4" stroke-width="2" opacity="0.25"/>
  <line x1="300" y1="250" x2="180" y2="350" stroke="#48cae4" stroke-width="2" opacity="0.25"/>
  <line x1="550" y1="200" x2="670" y2="250" stroke="#48cae4" stroke-width="1.5" opacity="0.2"/>
  <line x1="180" y1="350" x2="250" y2="460" stroke="#48cae4" stroke-width="1.5" opacity="0.2"/>
  <line x1="500" y1="430" x2="380" y2="480" stroke="#48cae4" stroke-width="1.5" opacity="0.2"/>

  <!-- Atom 1 - Large central molecule -->
  <circle cx="450" cy="300" r="40" fill="url(#glowCyan)" opacity="0.5"/>
  <circle cx="450" cy="300" r="28" fill="none" stroke="#48cae4" stroke-width="1.5" opacity="0.35"/>
  <circle cx="450" cy="300" r="8" fill="#48cae4" opacity="0.4"/>

  <!-- Orbital ring around Atom 1 -->
  <ellipse cx="450" cy="300" rx="65" ry="25" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.2" transform="rotate(-30 450 300)"/>
  <ellipse cx="450" cy="300" rx="65" ry="25" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.15" transform="rotate(40 450 300)"/>

  <!-- Atom 2 -->
  <circle cx="300" cy="250" r="30" fill="url(#glowCyan)" opacity="0.45"/>
  <circle cx="300" cy="250" r="22" fill="none" stroke="#48cae4" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="250" r="6" fill="#48cae4" opacity="0.35"/>

  <!-- Orbital ring around Atom 2 -->
  <ellipse cx="300" cy="250" rx="50" ry="18" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.18" transform="rotate(20 300 250)"/>

  <!-- Atom 3 -->
  <circle cx="550" cy="200" r="25" fill="url(#glowCyan)" opacity="0.4"/>
  <circle cx="550" cy="200" r="18" fill="none" stroke="#48cae4" stroke-width="1.5" opacity="0.28"/>
  <circle cx="550" cy="200" r="5" fill="#48cae4" opacity="0.35"/>

  <!-- Orbital arc around Atom 3 -->
  <ellipse cx="550" cy="200" rx="42" ry="15" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.15" transform="rotate(-45 550 200)"/>

  <!-- Atom 4 -->
  <circle cx="500" cy="430" r="22" fill="url(#atomGlow)" opacity="0.5"/>
  <circle cx="500" cy="430" r="16" fill="none" stroke="#90e0ef" stroke-width="1.5" opacity="0.25"/>
  <circle cx="500" cy="430" r="4" fill="#90e0ef" opacity="0.35"/>

  <!-- Atom 5 -->
  <circle cx="180" cy="350" r="20" fill="url(#atomGlow)" opacity="0.45"/>
  <circle cx="180" cy="350" r="14" fill="none" stroke="#90e0ef" stroke-width="1.5" opacity="0.25"/>
  <circle cx="180" cy="350" r="4" fill="#90e0ef" opacity="0.3"/>

  <!-- Smaller satellite atoms -->
  <circle cx="670" cy="250" r="12" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.2"/>
  <circle cx="670" cy="250" r="3" fill="#48cae4" opacity="0.3"/>

  <circle cx="250" cy="460" r="10" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.18"/>
  <circle cx="250" cy="460" r="2.5" fill="#48cae4" opacity="0.28"/>

  <circle cx="380" cy="480" r="11" fill="none" stroke="#48cae4" stroke-width="1" opacity="0.18"/>
  <circle cx="380" cy="480" r="2.5" fill="#48cae4" opacity="0.28"/>

  <!-- Scattered background dots (electrons / particles) -->
  <circle cx="120" cy="130" r="2" fill="#90e0ef" opacity="0.3"/>
  <circle cx="680" cy="100" r="1.5" fill="#90e0ef" opacity="0.25"/>
  <circle cx="720" cy="420" r="2" fill="#90e0ef" opacity="0.25"/>
  <circle cx="100" cy="500" r="1.5" fill="#90e0ef" opacity="0.3"/>
  <circle cx="400" cy="80" r="2" fill="#90e0ef" opacity="0.2"/>
  <circle cx="650" cy="520" r="1.5" fill="#90e0ef" opacity="0.2"/>
  <circle cx="200" cy="150" r="1.5" fill="#90e0ef" opacity="0.25"/>
  <circle cx="580" cy="530" r="2" fill="#90e0ef" opacity="0.2"/>
  <circle cx="750" cy="180" r="1.5" fill="#90e0ef" opacity="0.2"/>
  <circle cx="70" cy="270" r="2" fill="#90e0ef" opacity="0.25"/>
  <circle cx="350" cy="560" r="1.5" fill="#90e0ef" opacity="0.2"/>
  <circle cx="150" cy="50" r="1.5" fill="#90e0ef" opacity="0.2"/>
</svg>