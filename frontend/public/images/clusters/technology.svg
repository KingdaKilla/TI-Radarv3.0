<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#091428"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>

  <!-- Circuit board grid - horizontal lines -->
  <line x1="0" y1="120" x2="800" y2="120" stroke="#00b4d8" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#00b4d8" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="280" x2="800" y2="280" stroke="#00b4d8" stroke-width="1" opacity="0.18"/>
  <line x1="0" y1="360" x2="800" y2="360" stroke="#00b4d8" stroke-width="1" opacity="0.15"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="#00b4d8" stroke-width="1" opacity="0.12"/>
  <line x1="0" y1="520" x2="800" y2="520" stroke="#00b4d8" stroke-width="1" opacity="0.15"/>

  <!-- Circuit board grid - vertical lines -->
  <line x1="100" y1="0" x2="100" y2="600" stroke="#00b4d8" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="0" x2="200" y2="600" stroke="#00b4d8" stroke-width="1" opacity="0.12"/>
  <line x1="320" y1="0" x2="320" y2="600" stroke="#00b4d8" stroke-width="1" opacity="0.18"/>
  <line x1="440" y1="0" x2="440" y2="600" stroke="#00b4d8" stroke-width="1" opacity="0.15"/>
  <line x1="560" y1="0" x2="560" y2="600" stroke="#00b4d8" stroke-width="1" opacity="0.12"/>
  <line x1="680" y1="0" x2="680" y2="600" stroke="#00b4d8" stroke-width="1" opacity="0.15"/>

  <!-- Nodes at intersections -->
  <circle cx="100" cy="120" r="4" fill="#00b4d8" opacity="0.3"/>
  <circle cx="320" cy="120" r="5" fill="#00b4d8" opacity="0.35"/>
  <circle cx="560" cy="120" r="3" fill="#00b4d8" opacity="0.25"/>
  <circle cx="200" cy="200" r="4" fill="#00b4d8" opacity="0.3"/>
  <circle cx="440" cy="200" r="6" fill="#00b4d8" opacity="0.35"/>
  <circle cx="680" cy="200" r="3" fill="#00b4d8" opacity="0.25"/>
  <circle cx="100" cy="280" r="5" fill="#00b4d8" opacity="0.3"/>
  <circle cx="320" cy="280" r="4" fill="#00b4d8" opacity="0.35"/>
  <circle cx="560" cy="280" r="6" fill="#00b4d8" opacity="0.4"/>
  <circle cx="200" cy="360" r="3" fill="#00b4d8" opacity="0.25"/>
  <circle cx="440" cy="360" r="5" fill="#00b4d8" opacity="0.35"/>
  <circle cx="680" cy="360" r="4" fill="#00b4d8" opacity="0.3"/>
  <circle cx="100" cy="440" r="4" fill="#00b4d8" opacity="0.25"/>
  <circle cx="320" cy="440" r="3" fill="#00b4d8" opacity="0.3"/>
  <circle cx="560" cy="440" r="5" fill="#00b4d8" opacity="0.35"/>
  <circle cx="200" cy="520" r="4" fill="#00b4d8" opacity="0.3"/>
  <circle cx="440" cy="520" r="3" fill="#00b4d8" opacity="0.25"/>
  <circle cx="680" cy="520" r="4" fill="#00b4d8" opacity="0.3"/>

  <!-- Circuit traces - horizontal segments connecting nodes -->
  <line x1="100" y1="120" x2="320" y2="120" stroke="#00b4d8" stroke-width="2" opacity="0.25"/>
  <line x1="440" y1="200" x2="680" y2="200" stroke="#00b4d8" stroke-width="2" opacity="0.2"/>
  <line x1="320" y1="280" x2="560" y2="280" stroke="#00b4d8" stroke-width="2" opacity="0.25"/>
  <line x1="200" y1="360" x2="440" y2="360" stroke="#00b4d8" stroke-width="2" opacity="0.2"/>
  <line x1="100" y1="440" x2="320" y2="440" stroke="#00b4d8" stroke-width="2" opacity="0.2"/>

  <!-- Circuit traces - vertical segments -->
  <line x1="320" y1="120" x2="320" y2="280" stroke="#00b4d8" stroke-width="2" opacity="0.25"/>
  <line x1="560" y1="280" x2="560" y2="440" stroke="#00b4d8" stroke-width="2" opacity="0.2"/>
  <line x1="440" y1="200" x2="440" y2="360" stroke="#00b4d8" stroke-width="2" opacity="0.22"/>
  <line x1="680" y1="200" x2="680" y2="360" stroke="#00b4d8" stroke-width="2" opacity="0.2"/>

  <!-- Glowing dots -->
  <circle cx="320" cy="280" r="20" fill="url(#glowTeal)" opacity="0.6"/>
  <circle cx="320" cy="280" r="3" fill="#7df9ff" opacity="0.8"/>

  <circle cx="440" cy="200" r="18" fill="url(#glowTeal)" opacity="0.5"/>
  <circle cx="440" cy="200" r="3" fill="#7df9ff" opacity="0.7"/>

  <circle cx="560" cy="440" r="22" fill="url(#glowTeal)" opacity="0.5"/>
  <circle cx="560" cy="440" r="3" fill="#7df9ff" opacity="0.75"/>

  <circle cx="680" cy="360" r="16" fill="url(#glowTeal)" opacity="0.45"/>
  <circle cx="680" cy="360" r="2.5" fill="#7df9ff" opacity="0.7"/>

  <circle cx="100" cy="120" r="14" fill="url(#glowTeal)" opacity="0.4"/>
  <circle cx="100" cy="120" r="2" fill="#7df9ff" opacity="0.65"/>

  <!-- Subtle large geometric shapes for depth -->
  <rect x="250" y="150" width="180" height="180" rx="8" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.1" transform="rotate(15 340 240)"/>
  <rect x="450" y="300" width="140" height="140" rx="6" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.08" transform="rotate(-10 520 370)"/>

  <!-- Small scattered accent dots -->
  <circle cx="150" cy="170" r="1.5" fill="#90e0ef" opacity="0.4"/>
  <circle cx="510" cy="150" r="1.5" fill="#90e0ef" opacity="0.35"/>
  <circle cx="620" cy="470" r="2" fill="#90e0ef" opacity="0.3"/>
  <circle cx="370" cy="490" r="1.5" fill="#90e0ef" opacity="0.35"/>
  <circle cx="730" cy="130" r="1.5" fill="#90e0ef" opacity="0.3"/>
  <circle cx="60" cy="380" r="2" fill="#90e0ef" opacity="0.3"/>
</svg>