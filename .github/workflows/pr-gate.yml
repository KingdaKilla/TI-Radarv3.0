# ============================================================
# PR Quality Gate — Single status check for merge readiness
# ============================================================
# Replaces branch protection rules (unavailable on GitHub Free
# for private repos) with a consolidated quality gate that runs
# all critical checks and produces ONE clear green/red status.
#
# The job "Quality Gate (all checks must pass)" can be configured
# as a required status check if the repo upgrades to Pro or
# becomes public.
# ============================================================

name: PR Quality Gate

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-gate-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: shared package lint + type check ──
  backend-shared:
    name: "Backend / shared"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-shared-${{ runner.os }}-${{ hashFiles('packages/shared/pyproject.toml') }}
          restore-keys: |
            uv-shared-${{ runner.os }}-

      - name: Install shared domain package
        run: pip install -e "packages/shared[dev]"

      - name: Lint shared (ruff)
        run: ruff check packages/shared/domain/

      - name: Type check shared (mypy)
        run: mypy packages/shared/domain/

      - name: Shared domain unit tests
        env:
          PYTHONPATH: .
        run: python -m pytest packages/shared/tests/ -v --tb=short

  # ── Backend: service lint + type check + unit tests (matrix) ──
  backend-services:
    name: "Backend / ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: backend-shared
    strategy:
      fail-fast: false
      matrix:
        service:
          - orchestrator-svc
          - landscape-svc
          - maturity-svc
          - competitive-svc
          - funding-svc
          - cpc-flow-svc
          - geographic-svc
          - research-impact-svc
          - temporal-svc
          - tech-cluster-svc
          - actor-type-svc
          - patent-grant-svc
          - euroscivoc-svc
          - import-svc
          - export-svc
          - publication-svc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-svc-${{ runner.os }}-${{ hashFiles(format('services/{0}/pyproject.toml', matrix.service)) }}
          restore-keys: |
            uv-svc-${{ runner.os }}-

      - name: Install shared domain package
        run: |
          cd packages/shared
          pip install -e .

      - name: Install service dependencies
        run: |
          cd services/${{ matrix.service }}
          uv sync --frozen 2>/dev/null || uv sync

      - name: Lint (ruff)
        run: |
          cd services/${{ matrix.service }}
          uv run ruff check src/

      - name: Type check (mypy)
        run: |
          cd services/${{ matrix.service }}
          uv run mypy src/

      - name: Unit tests
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          DATABASE_URL: postgresql://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ vars.POSTGRES_DB }}
          EPO_OPS_CONSUMER_KEY: ${{ secrets.EPO_OPS_CONSUMER_KEY }}
          EPO_OPS_CONSUMER_SECRET: ${{ secrets.EPO_OPS_CONSUMER_SECRET }}
          CORDIS_API_KEY: ${{ secrets.CORDIS_API_KEY }}
          OPENAIRE_ACCESS_TOKEN: ${{ secrets.OPENAIRE_ACCESS_TOKEN }}
          OPENAIRE_REFRESH_TOKEN: ${{ secrets.OPENAIRE_REFRESH_TOKEN }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          cd services/${{ matrix.service }}
          uv run pytest tests/unit/ -v --tb=short

  # ── Frontend: install, type check, build, lint ──
  frontend:
    name: "Frontend"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

      - name: Lint
        run: cd frontend && npm run lint

  # ── Proto: buf lint + compile ──
  proto:
    name: "Proto"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@v1

      - name: Buf Lint
        run: cd proto && buf lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install grpcio-tools
        run: pip install grpcio-tools

      - name: Compile Proto Files
        run: |
          mkdir -p packages/shared/generated/python
          python -m grpc_tools.protoc \
            --proto_path=proto \
            --python_out=packages/shared/generated/python \
            --grpc_python_out=packages/shared/generated/python \
            --pyi_out=packages/shared/generated/python \
            proto/*.proto

  # ── Docker Compose validation ──
  docker:
    name: "Docker Compose"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose config
        run: docker compose -f deploy/docker-compose.yml config --quiet

  # ============================================================
  # Final gate — aggregates ALL jobs into one status check
  # ============================================================
  gate:
    name: "Quality Gate (all checks must pass)"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-shared
      - backend-services
      - frontend
      - proto
      - docker
    steps:
      - name: Evaluate results
        run: |
          echo "=== Job Results ==="
          echo "backend-shared:    ${{ needs.backend-shared.result }}"
          echo "backend-services:  ${{ needs.backend-services.result }}"
          echo "frontend:          ${{ needs.frontend.result }}"
          echo "proto:             ${{ needs.proto.result }}"
          echo "docker:            ${{ needs.docker.result }}"
          echo "==================="

          if [ "${{ needs.backend-shared.result }}" != "success" ] || \
             [ "${{ needs.backend-services.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ] || \
             [ "${{ needs.proto.result }}" != "success" ] || \
             [ "${{ needs.docker.result }}" != "success" ]; then
            echo ""
            echo "One or more checks failed — PR is NOT ready to merge."
            exit 1
          fi

          echo ""
          echo "All checks passed — PR is ready to merge."
