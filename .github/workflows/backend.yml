# Backend CI — Shared Domain Tests + Matrix Strategy (16 Services parallel)
name: Backend CI

on:
  push:
    paths:
      - "services/**"
      - "packages/shared/**"
  pull_request:
    paths:
      - "services/**"
      - "packages/shared/**"

jobs:
  # ── Shared Domain Tests (216+ Unit Tests) ──
  shared-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-shared-${{ runner.os }}-${{ hashFiles('packages/shared/pyproject.toml') }}
          restore-keys: |
            uv-shared-${{ runner.os }}-

      - name: Install shared domain package
        run: pip install -e "packages/shared[dev]"

      - name: Lint shared (ruff)
        run: ruff check packages/shared/domain/
        continue-on-error: true

      - name: Type check shared (mypy)
        run: mypy packages/shared/domain/
        continue-on-error: true

      - name: Shared domain unit tests
        env:
          PYTHONPATH: .
        run: python -m pytest packages/shared/tests/ -v --tb=short --cov=packages/shared/domain --cov-report=term-missing --cov-report=xml:coverage-shared.xml

      - name: Upload shared coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shared
          path: coverage-shared.xml

  # ── Service Tests (16 Services parallel) ──
  test:
    runs-on: ubuntu-latest
    needs: shared-tests
    strategy:
      fail-fast: false
      matrix:
        service:
          - orchestrator-svc
          - landscape-svc
          - maturity-svc
          - competitive-svc
          - funding-svc
          - cpc-flow-svc
          - geographic-svc
          - research-impact-svc
          - temporal-svc
          - tech-cluster-svc
          - actor-type-svc
          - patent-grant-svc
          - euroscivoc-svc
          - import-svc
          - export-svc
          - publication-svc

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-svc-${{ runner.os }}-${{ hashFiles(format('services/{0}/pyproject.toml', matrix.service)) }}
          restore-keys: |
            uv-svc-${{ runner.os }}-

      - name: Install shared domain package
        run: |
          cd packages/shared
          pip install -e .

      - name: Install service dependencies
        run: |
          cd services/${{ matrix.service }}
          uv sync --frozen 2>/dev/null || uv sync

      - name: Lint (ruff)
        run: |
          cd services/${{ matrix.service }}
          uv run ruff check src/
        continue-on-error: true

      - name: Type check (mypy)
        run: |
          cd services/${{ matrix.service }}
          uv run mypy src/
        continue-on-error: true

      - name: Unit tests with coverage
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          DATABASE_URL: postgresql://${{ vars.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ vars.POSTGRES_DB }}
          EPO_OPS_CONSUMER_KEY: ${{ secrets.EPO_OPS_CONSUMER_KEY }}
          EPO_OPS_CONSUMER_SECRET: ${{ secrets.EPO_OPS_CONSUMER_SECRET }}
          CORDIS_API_KEY: ${{ secrets.CORDIS_API_KEY }}
          OPENAIRE_ACCESS_TOKEN: ${{ secrets.OPENAIRE_ACCESS_TOKEN }}
          OPENAIRE_REFRESH_TOKEN: ${{ secrets.OPENAIRE_REFRESH_TOKEN }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          cd services/${{ matrix.service }}
          uv run pytest tests/unit/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml:../../coverage-svc.xml
        continue-on-error: true

      - name: Upload service coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: coverage-svc.xml
