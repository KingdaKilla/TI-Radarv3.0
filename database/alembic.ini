# Alembic Configuration for TI Platform v2
# PostgreSQL migration management

[alembic]
script_location = migrations
prepend_sys_path = .

# Connection string: override via TIPLATFORM_DATABASE_URL env var
sqlalchemy.url = postgresql+asyncpg://tip_admin:YOUR_PASSWORD_HERE@localhost:5432/ti_radar

[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
