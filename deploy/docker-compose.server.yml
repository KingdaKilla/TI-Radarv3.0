# ============================================================
# TI-Radar — Docker Compose SERVER (GHCR Images)
# ============================================================
# Nutzung auf dem Server:
#   docker compose --env-file .env -f deploy/docker-compose.server.yml up -d
#
# Voraussetzung: .env mit GHCR_OWNER (GitHub-User/Org) und IMAGE_TAG
# ============================================================

x-uc-service: &uc-service-defaults
  restart: unless-stopped
  depends_on:
    db:
      condition: service_healthy
  networks:
    - backend
  deploy:
    resources:
      limits:
        memory: 512M
        cpus: "0.5"

services:
  # ==================== Datenbank ====================
  db:
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-db:${IMAGE_TAG:-latest}
    container_name: ti-radar-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ti_radar}
      POSTGRES_USER: ${POSTGRES_USER:-tip_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 1g
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tip_admin} -d ${POSTGRES_DB:-ti_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
    networks:
      - backend

  # ==================== Orchestrator ====================
  orchestrator-svc:
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-orchestrator-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-orchestrator
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tip_admin}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-ti_radar}
      UC_LANDSCAPE_ADDRESS: landscape-svc:50051
      UC_MATURITY_ADDRESS: maturity-svc:50051
      UC_COMPETITIVE_ADDRESS: competitive-svc:50051
      UC_FUNDING_ADDRESS: funding-svc:50051
      UC_CPC_FLOW_ADDRESS: cpc-flow-svc:50051
      UC_GEOGRAPHIC_ADDRESS: geographic-svc:50051
      UC_RESEARCH_IMPACT_ADDRESS: research-impact-svc:50051
      UC_TEMPORAL_ADDRESS: temporal-svc:50051
      UC_TECH_CLUSTER_ADDRESS: tech-cluster-svc:50051
      UC_ACTOR_TYPE_ADDRESS: actor-type-svc:50051
      UC_PATENT_GRANT_ADDRESS: patent-grant-svc:50051
      UC_EUROSCIVOC_ADDRESS: euroscivoc-svc:50051
      UC_PUBLICATION_ADDRESS: publication-svc:50051
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - backend
      - frontend

  # ==================== UC-Services (13x) ====================
  landscape-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-landscape-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc1
    environment:
      DATABASE_URL: postgresql://svc_landscape:${SVC_LANDSCAPE_PW:-svc_landscape_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      OPENAIRE_ACCESS_TOKEN: ${OPENAIRE_ACCESS_TOKEN:-}
      OPENAIRE_REFRESH_TOKEN: ${OPENAIRE_REFRESH_TOKEN:-}
      SERVICE_PORT: "50051"

  maturity-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-maturity-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc2
    environment:
      DATABASE_URL: postgresql://svc_maturity:${SVC_MATURITY_PW:-svc_maturity_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  competitive-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-competitive-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc3
    environment:
      DATABASE_URL: postgresql://svc_competitive:${SVC_COMPETITIVE_PW:-svc_competitive_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  funding-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-funding-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc4
    environment:
      DATABASE_URL: postgresql://svc_funding:${SVC_FUNDING_PW:-svc_funding_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  cpc-flow-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-cpc-flow-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc5
    environment:
      DATABASE_URL: postgresql://svc_cpc_flow:${SVC_CPC_FLOW_PW:-svc_cpc_flow_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  geographic-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-geographic-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc6
    environment:
      DATABASE_URL: postgresql://svc_geographic:${SVC_GEOGRAPHIC_PW:-svc_geographic_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  research-impact-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-research-impact-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc7
    environment:
      DATABASE_URL: postgresql://svc_research_impact:${SVC_RESEARCH_IMPACT_PW:-svc_research_impact_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY:-}
      SERVICE_PORT: "50051"

  temporal-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-temporal-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc8
    environment:
      DATABASE_URL: postgresql://svc_temporal:${SVC_TEMPORAL_PW:-svc_temporal_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  tech-cluster-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-tech-cluster-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc9
    environment:
      DATABASE_URL: postgresql://svc_tech_cluster:${SVC_TECH_CLUSTER_PW:-svc_tech_cluster_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  actor-type-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-actor-type-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc11
    environment:
      DATABASE_URL: postgresql://svc_actor_type:${SVC_ACTOR_TYPE_PW:-svc_actor_type_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"
      GLEIF_ENABLED: ${GLEIF_ENABLED:-true}

  patent-grant-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-patent-grant-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc12
    environment:
      DATABASE_URL: postgresql://svc_patent_grant:${SVC_PATENT_GRANT_PW:-svc_patent_grant_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  euroscivoc-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-euroscivoc-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc10
    environment:
      DATABASE_URL: postgresql://svc_euroscivoc:${SVC_EUROSCIVOC_PW:-svc_euroscivoc_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  publication-svc:
    <<: *uc-service-defaults
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-publication-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-uc-c
    environment:
      DATABASE_URL: postgresql://svc_publication:${SVC_PUBLICATION_PW:-svc_publication_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      SERVICE_PORT: "50051"

  # ==================== Import-Service ====================
  import-svc:
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-import-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-import
    volumes:
      - "${EPO_BULK_PATH:-./.empty}:/data/bulk/EPO:ro"
      - "${CORDIS_BULK_PATH:-./.empty}:/data/bulk/CORDIS:ro"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tip_admin}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-ti_radar}
      IMPORT_SCHEDULE: ${IMPORT_SCHEDULE:-0 2 * * 0}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
    ports:
      - "127.0.0.1:8030:8030"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - backend

  # ==================== Export-Service ====================
  export-svc:
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-export-svc:${IMAGE_TAG:-latest}
    container_name: ti-radar-export
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://svc_export:${SVC_EXPORT_PW:-svc_export_pw}@db:5432/${POSTGRES_DB:-ti_radar}
      ORCHESTRATOR_URL: http://orchestrator-svc:8000
    ports:
      - "127.0.0.1:8020:8020"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - backend
      - frontend

  # ==================== Frontend ====================
  frontend:
    image: ghcr.io/${GHCR_OWNER:-kingdakilla}/ti-radar-frontend:${IMAGE_TAG:-latest}
    container_name: ti-radar-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - orchestrator-svc
    environment:
      INTERNAL_API_URL: http://orchestrator-svc:8000
      EXPORT_API_URL: http://export-svc:8020
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    networks:
      - frontend

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
