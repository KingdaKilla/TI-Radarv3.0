# Docker Build + Push to GitHub Container Registry (ghcr.io)
name: Docker Build & Publish

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/ti-radar

jobs:
  generate-protos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install grpcio-tools
        run: pip install grpcio-tools protobuf

      - name: Generate gRPC Proto Stubs
        run: bash scripts/generate_protos.sh

      - name: Upload proto stubs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: proto-stubs
          path: packages/shared/generated/
          retention-days: 1

  build-and-push:
    needs: generate-protos
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # UC-Services (shared Dockerfile)
          - service: landscape-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/landscape-svc
          - service: maturity-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/maturity-svc
          - service: competitive-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/competitive-svc
          - service: funding-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/funding-svc
          - service: cpc-flow-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/cpc-flow-svc
          - service: geographic-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/geographic-svc
          - service: research-impact-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/research-impact-svc
          - service: temporal-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/temporal-svc
          - service: tech-cluster-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/tech-cluster-svc
          - service: actor-type-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/actor-type-svc
          - service: patent-grant-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/patent-grant-svc
          - service: euroscivoc-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/euroscivoc-svc
          - service: publication-svc
            dockerfile: services/uc-service.Dockerfile
            context: .
            build-args: SERVICE_DIR=services/publication-svc
          # Datenbank (eigenes Image mit Init-Skripten)
          - service: db
            dockerfile: database/Dockerfile
            context: .
            build-args: ""
          # Eigenstaendige Services
          - service: orchestrator-svc
            dockerfile: services/orchestrator-svc/Dockerfile
            context: .
            build-args: ""
          - service: import-svc
            dockerfile: services/import-svc/Dockerfile
            context: .
            build-args: ""
          - service: export-svc
            dockerfile: services/export-svc/Dockerfile
            context: .
            build-args: ""
          # Frontend
          - service: frontend
            dockerfile: frontend/Dockerfile
            context: frontend
            build-args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Download proto stubs
        uses: actions/download-artifact@v4
        with:
          name: proto-stubs
          path: packages/shared/generated/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: ${{ (github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
